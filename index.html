<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>TOFA V17 | GOD EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #010816; --surf: #0a1931; --card: #122a4d; --prim: #00d4ff; --acc: #7000ff; --txt: #e6edf3; --brd: #1e3a5f; --danger: #ff4b2b; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; transition: all 0.2s ease; }
        body, html { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; }
        @keyframes msgIn { from { transform: scale(0.9) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .anim-msg { animation: msgIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        header { padding: 15px 20px; background: rgba(10, 25, 49, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .p-ava { width: 52px; height: 52px; border-radius: 16px; border: 2px solid var(--prim); object-fit: cover; cursor: pointer; background: #000; }
        .xp-container { flex: 1; margin-left: 12px; }
        .xp-bar { width: 100%; height: 6px; background: #000; border-radius: 10px; margin-top: 6px; border: 1px solid var(--brd); overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, var(--prim), var(--acc)); width: 0%; transition: 1.5s width ease-in-out; }
        main { height: calc(100vh - 175px); overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .section { display: none; } .section.active { display: block; }
        .card { background: var(--card); padding: 18px; border-radius: 22px; border: 1px solid var(--brd); margin-bottom: 18px; position: relative; }
        .in-box { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--brd); padding: 14px 20px; border-radius: 30px; color: #fff; font-size: 14px; margin-bottom: 12px; }
        .bubble { padding: 16px 20px; border-radius: 22px; font-size: 14px; max-width: 88%; line-height: 1.6; margin-bottom: 10px; }
        .ai, .dm-in { background: var(--card); border: 1px solid var(--brd); color: var(--txt); border-bottom-left-radius: 4px; }
        .me, .dm-out { background: linear-gradient(135deg, var(--acc), #5000cc); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; margin-left: auto; }
        .dock { position: fixed; bottom: 0; width: 100%; background: var(--surf); border-top: 1px solid var(--brd); padding: 10px 15px 35px; z-index: 1000; }
        .input-area { display: flex; align-items: center; gap: 12px; background: #000; padding: 12px 20px; border-radius: 35px; border: 1px solid var(--brd); }
        .input-area input { flex: 1; background: none; border: none; color: white; font-size: 14px; }
        nav { display: flex; justify-content: space-around; margin-top: 18px; }
        .nav-item { font-size: 11px; font-weight: 900; color: #444; text-align: center; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--prim); text-shadow: 0 0 10px var(--prim); }
        #auth-gate { position: fixed; inset: 0; z-index: 15000; background: radial-gradient(circle at center, var(--surf), var(--bg)); display: flex; align-items: center; justify-content: center; padding: 25px; }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 900; text-transform: uppercase; margin-left: 6px; }
        .bg-god { background: var(--gold); color: #000; }
        .save-btn { width: 100%; background: var(--prim); border: none; padding: 15px; border-radius: 15px; font-weight: 900; color: #000; cursor: pointer; }
        /* MODAL ADMIN */
        #admin-panel { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:20000; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-box" style="width:100%; max-width:400px; text-align:center;">
        <h1 style="color:var(--prim); letter-spacing:8px;">TOFA V17</h1>
        <div style="display:flex; background:#000; padding:5px; border-radius:15px; margin-bottom:20px; border:1px solid var(--brd);">
            <button onclick="ui.setAuth('login')" id="btn-login" class="save-btn" style="background:var(--prim)">LOGIN</button>
            <button onclick="ui.setAuth('signup')" id="btn-signup" class="save-btn" style="background:none; color:#666">SIGNUP</button>
        </div>
        <input id="au" class="in-box" placeholder="User ID">
        <input id="ap" type="password" class="in-box" placeholder="Passcode">
        <button onclick="core.auth()" class="save-btn">INITIALIZE SYSTEM</button>
    </div>
</div>

<header id="h-main" style="display:none;">
    <div style="display:flex; align-items:center; width:100%;">
        <img id="u-ava" src="https://i.ibb.co/vz6mS8X/dev.png" class="p-ava" onclick="ui.nav('settings', document.querySelectorAll('.nav-item')[3])">
        <div class="xp-container">
            <div style="display:flex; align-items:center;"><b id="u-name"></b><span id="u-role-badge" class="badge"></span></div>
            <div id="u-lv-text" style="font-size:10px; color:var(--prim); font-weight:800;">SYNCING...</div>
            <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
        </div>
    </div>
</header>

<main id="viewport" style="display:none;">
    <div id="s-ai" class="section active"><div id="chat-container"></div></div>
    <div id="s-feed" class="section">
        <div class="card"><textarea id="f-msg" class="in-box" style="height:80px; resize:none;" placeholder="Ketik sesuatu di Feed..."></textarea><button onclick="core.post()" class="save-btn">BROADCAST</button></div>
        <div id="f-list"></div>
    </div>
    <div id="s-dm" class="section">
        <div id="dm-list-view"><h3 style="color:var(--prim)">NETWORK</h3><div id="member-list"></div></div>
        <div id="dm-chat-view" style="display:none;"><button onclick="ui.backToDM()" style="background:none; border:1px solid var(--prim); color:var(--prim); padding:5px 15px; border-radius:10px; margin-bottom:10px; cursor:pointer;">⬅ BACK</button><div id="dm-chat-box" style="display:flex; flex-direction:column;"></div></div>
    </div>
    <div id="s-settings" class="section">
        <div class="card"><h3 style="color:var(--prim)">MY IDENTITY</h3><input id="set-bio" class="in-box" placeholder="Update Bio"><input id="set-ttl" class="in-box" placeholder="TTL"><button onclick="core.saveProfile()" class="save-btn">SAVE CHANGES</button></div>
        <div id="god-tools" style="display:none;"><button onclick="document.getElementById('admin-panel').style.display='block'" style="width:100%; padding:15px; background:var(--gold); color:#000; border-radius:15px; font-weight:900; margin-bottom:10px; border:none;">⚡ OPEN ADMIN CONSOLE</button></div>
        <button onclick="core.logout()" style="width:100%; padding:15px; background:none; border:1px solid red; color:red; border-radius:15px; font-weight:900;">TERMINATE SESSION</button>
    </div>
</main>

<div id="admin-panel">
    <button onclick="this.parentElement.style.display='none'" style="float:right; color:white; background:none; border:none; font-size:24px;">×</button>
    <h2 style="color:var(--gold)">GOD OVERRIDE</h2>
    <div class="card"><h4>FEED CONTROL</h4><button onclick="core.adminClearFeed()" style="background:red; color:white; border:none; padding:10px; border-radius:10px; width:100%;">WIPE ALL FEED DATA</button></div>
    <div class="card"><h4>USER DATABASE</h4><div id="admin-user-list"></div></div>
</div>

<div id="d-main" class="dock" style="display:none;">
    <div class="input-area"><input id="ci" placeholder="Enter message..." onkeypress="if(event.key==='Enter')core.handleSend()"><button onclick="core.handleSend()" style="background:none; border:none; color:var(--prim); font-weight:900;">SEND</button></div>
    <nav><div class="nav-item active" onclick="ui.nav('ai', this)">🧠 AI</div><div class="nav-item" onclick="ui.nav('feed', this)">📡 Feed</div><div class="nav-item" onclick="ui.nav('dm', this)">📩 Inbox</div><div class="nav-item" onclick="ui.nav('settings', this)">⚙️ Core</div></nav>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDi8pUKnxBmqESeKsVY7p-qfciucJojFs8",
  authDomain: "tofa-ai.firebaseapp.com",
  projectId: "tofa-ai",
  storageBucket: "tofa-ai.firebasestorage.app",
  messagingSenderId: "55903781858",
  appId: "1:55903781858:web:805e9844a703e646c42fbb",
  databaseURL: "https://tofa-ai-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const fdb = firebase.database();
let curUser = localStorage.getItem('tofa_cur');
let authMode = 'login', activeDM = null;

const core = {
    auth: () => {
        const u = document.getElementById('au').value.toLowerCase().trim();
        const p = document.getElementById('ap').value;
        if(!u || !p) return alert("Masukan data!");
        fdb.ref('users/' + u).once('value', (s) => {
            const data = s.val();
            if(authMode === 'login') {
                if(data && data.pass === p) { localStorage.setItem('tofa_cur', u); location.reload(); }
                else alert("Akses Ditolak!");
            } else {
                if(data) return alert("ID Terpakai!");
                fdb.ref('users/' + u).set({ pass: p, role: (u === 'mustofa' ? 'GOD' : 'MEMBER'), bio: 'New User', ttl: '-', ava: 'https://i.ibb.co/vz6mS8X/dev.png' }).then(() => { localStorage.setItem('tofa_cur', u); location.reload(); });
            }
        });
    },
    handleSend: () => {
        const val = document.getElementById('ci').value; if(!val) return;
        if(document.getElementById('s-ai').classList.contains('active')) core.sendAI(val);
        else if(activeDM) core.sendDM(val);
        document.getElementById('ci').value = "";
    },
    sendAI: (val) => {
        ui.bubble('me', val, 'chat-container');
        setTimeout(() => {
            let m = val.toLowerCase(), res = "Neural link aktif. Saya mendengarkan, Master.";
            if(m.includes("halo")) res = "Halo Master Mustofa! Cloud system sinkron.";
            ui.type(res, 'chat-container');
        }, 600);
    },
    sendDM: (val) => {
        const path = activeDM < curUser ? `${activeDM}_${curUser}` : `${curUser}_${activeDM}`;
        fdb.ref('chats/' + path).push({ from: curUser, txt: val, ts: Date.now() });
    },
    post: () => {
        const t = document.getElementById('f-msg').value; if(!t) return;
        fdb.ref('posts').push({ u: curUser, txt: t, ts: Date.now() });
        document.getElementById('f-msg').value = "";
    },
    saveProfile: () => {
        fdb.ref('users/' + curUser).update({ bio: document.getElementById('set-bio').value, ttl: document.getElementById('set-ttl').value }).then(() => alert("Cloud Sync Sukses!"));
    },
    adminClearFeed: () => { if(confirm("Hapus semua Feed?")) fdb.ref('posts').remove(); },
    adminDeleteUser: (uid) => { if(confirm("Hapus user "+uid+"?")) fdb.ref('users/'+uid).remove(); },
    logout: () => { localStorage.removeItem('tofa_cur'); location.reload(); }
};

const ui = {
    setAuth: (m) => {
        authMode = m;
        document.getElementById('btn-login').style.background = (m==='login'?'var(--prim)':'none');
        document.getElementById('btn-signup').style.background = (m==='signup'?'var(--prim)':'none');
    },
    nav: (s, el) => {
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        document.getElementById('s-'+s).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    },
    bubble: (type, txt, id) => {
        const d = document.createElement('div'); d.className = `bubble ${type} anim-msg`; d.innerText = txt;
        document.getElementById(id).appendChild(d); document.getElementById('viewport').scrollTop = 99999;
    },
    type: (txt, id) => {
        const d = document.createElement('div'); d.className = 'bubble ai anim-msg';
        document.getElementById(id).appendChild(d);
        let i = 0; const t = setInterval(() => {
            if(i < txt.length) { d.innerHTML += txt.charAt(i); i++; } else clearInterval(t);
            document.getElementById('viewport').scrollTop = 99999;
        }, 20);
    },
    openDM: (target) => {
        activeDM = target;
        document.getElementById('dm-list-view').style.display = 'none';
        document.getElementById('dm-chat-view').style.display = 'block';
        const path = activeDM < curUser ? `${activeDM}_${curUser}` : `${curUser}_${activeDM}`;
        fdb.ref('chats/' + path).off();
        fdb.ref('chats/' + path).on('value', (s) => {
            const box = document.getElementById('dm-chat-box'); box.innerHTML = "";
            if(s.exists()) Object.values(s.val()).forEach(m => {
                const d = document.createElement('div'); d.className = `bubble ${m.from === curUser ? 'dm-out' : 'dm-in'} anim-msg`;
                d.innerText = m.txt; box.appendChild(d);
            });
            document.getElementById('viewport').scrollTop = 99999;
        });
    },
    backToDM: () => { activeDM = null; document.getElementById('dm-list-view').style.display = 'block'; document.getElementById('dm-chat-view').style.display = 'none'; }
};

window.onload = () => {
    if(curUser) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('h-main').style.display = 'flex';
        document.getElementById('viewport').style.display = 'block';
        document.getElementById('d-main').style.display = 'block';
        
        fdb.ref('users/' + curUser).on('value', (s) => {
            const u = s.val(); if(!u) return core.logout();
            document.getElementById('u-name').innerText = curUser.toUpperCase();
            document.getElementById('u-ava').src = u.ava;
            document.getElementById('u-role-badge').innerText = u.role;
            if(u.role==='GOD') {
                document.getElementById('u-role-badge').classList.add('bg-god');
                document.getElementById('god-tools').style.display = 'block';
            }
            document.getElementById('u-lv-text').innerText = `RANK: ${u.role}`;
            document.getElementById('xp-fill').style.width = '100%';
            document.getElementById('set-bio').value = u.bio; document.getElementById('set-ttl').value = u.ttl;
        });

        fdb.ref('posts').on('value', (s) => {
            const list = document.getElementById('f-list'); list.innerHTML = "";
            if(s.exists()) Object.values(s.val()).reverse().forEach(p => {
                list.innerHTML += `<div class="card anim-msg"><b>@${p.u}</b><p>${p.txt}</p></div>`;
            });
        });

        fdb.ref('users').on('value', (s) => {
            const list = document.getElementById('member-list'); const alist = document.getElementById('admin-user-list');
            list.innerHTML = ""; alist.innerHTML = "";
            Object.keys(s.val()).forEach(u => {
                if(u !== curUser) list.innerHTML += `<div class="card" onclick="ui.openDM('${u}')" style="cursor:pointer"><b>@${u.toUpperCase()}</b><br><small>${s.val()[u].bio}</small></div>`;
                if(u !== 'mustofa') alist.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${u}</span><button onclick="core.adminDeleteUser('${u}')" style="color:red; background:none; border:1px solid red; border-radius:5px; font-size:10px;">BAN</button></div>`;
            });
        });
        ui.type(`Cloud System Online. Welcome, Master Mustofa.`, 'chat-container');
    }
};
</script>
</body>
</html>
